<p-toast />

<div class="misafir-page">
    <section class="misafir-section">
        <div class="section-header">
            <div>
                <h2 class="section-title">Tesis Bazli Misafir Tipi Atamasi</h2>
                <p class="section-subtitle">
                    Global misafir tipi tanimlarindan hangilerinin secili tesiste kullanilabilecegini belirleyin.
                </p>
            </div>

            <div class="flex gap-2 flex-wrap">
                @if (canViewGlobalDefinitions) {
                    <p-button label="Global Tanimlar" icon="pi pi-external-link" severity="secondary" [outlined]="true" (onClick)="openGlobalDefinitions()" />
                }
                <p-button label="Yenile" icon="pi pi-refresh" severity="secondary" [outlined]="true" [loading]="loadingBaglam || loadingAtamalar" (onClick)="refresh()" />
                @if (canManageAssignments) {
                    <p-button label="Tesis Atamalarini Kaydet" icon="pi pi-check" [loading]="savingAtamalar" (onClick)="kaydetTesisAtamalari()" />
                }
            </div>
        </div>

        <div class="assignment-controls">
            <div>
                <label for="tesisSecimi" class="block font-medium mb-2">Tesis</label>
                <p-select
                    inputId="tesisSecimi"
                    [options]="tesisSecenekleri"
                    optionLabel="label"
                    optionValue="value"
                    [(ngModel)]="selectedTesisId"
                    [showClear]="false"
                    placeholder="Tesis secin"
                    class="w-full"
                    [disabled]="loadingBaglam || loadingAtamalar"
                    (ngModelChange)="onTesisChange()"
                />
            </div>

            <div class="assignment-note">
                <p-tag severity="info" value="Tesis yoneticileri bu ekrandan yalnizca kendi tesislerindeki misafir tipi kullanimini yonetir." />
            </div>
        </div>

        <p-table
            [value]="tesisAtamalari"
            dataKey="misafirTipiId"
            [loading]="loadingAtamalar"
            [tableStyle]="{ 'min-width': '52rem' }"
            styleClass="misafir-table"
        >
            <ng-template #header>
                <tr>
                    <th style="width: 8rem;">Tesiste Var</th>
                    <th style="width: 8rem;">Global Aktif</th>
                    <th style="width: 12rem;">Kod</th>
                    <th>Ad</th>
                </tr>
            </ng-template>

            <ng-template #body let-item>
                <tr>
                    <td>
                        <p-checkbox
                            [binary]="true"
                            [(ngModel)]="item.tesisteKullanilabilirMi"
                            [disabled]="!canManageAssignments || !item.globalAktifMi"
                            (ngModelChange)="toggleTesisAtamasi(item, $event)"
                        />
                    </td>
                    <td>
                        <p-tag [severity]="item.globalAktifMi ? 'success' : 'danger'" [value]="item.globalAktifMi ? 'Evet' : 'Hayir'" />
                    </td>
                    <td>{{ item.kod }}</td>
                    <td>{{ item.ad }}</td>
                </tr>
            </ng-template>
        </p-table>
    </section>
</div>
