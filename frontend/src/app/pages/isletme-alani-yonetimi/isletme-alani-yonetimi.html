<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        @if (canManage) {
            <p-button label="Yeni Isletme Alani" icon="pi pi-plus" class="mr-2" (onClick)="openNew()" />
        }
        @if (canView) {
            <p-button label="Isletme Alani Siniflari" icon="pi pi-list" severity="contrast" [outlined]="true" class="mr-2" (onClick)="openSinifYonetimi()" />
        }
        <p-button label="Yenile" icon="pi pi-refresh" severity="secondary" [outlined]="true" (onClick)="refresh()" />
    </ng-template>
</p-toolbar>

<p-table
    [value]="alanlar"
    [loading]="loading"
    dataKey="id"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    sortMode="single"
    [paginator]="true"
    [rows]="pageSize"
    [first]="(pageNumber - 1) * pageSize"
    [rowsPerPageOptions]="[10, 20, 50]"
    [totalRecords]="totalRecords"
    [tableStyle]="{ 'min-width': '60rem' }"
    currentPageReportTemplate="{first} - {last} / {totalRecords}"
    [showCurrentPageReport]="true"
>
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Isletme Alani Yonetimi</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" [ngModel]="searchQuery" placeholder="Ara..." (input)="onSearchInput($event)" />
            </p-iconfield>
        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th pSortableColumn="ad">Alan Adi <p-sortIcon field="ad" /></th>
            <th pSortableColumn="sinifAd">Sinif <p-sortIcon field="sinifAd" /></th>
            <th pSortableColumn="ozelAd">Ozel Ad <p-sortIcon field="ozelAd" /></th>
            <th pSortableColumn="binaId">Bina <p-sortIcon field="binaId" /></th>
            <th pSortableColumn="aktifMi">Durum <p-sortIcon field="aktifMi" /></th>
            <th style="width: 18rem">Islem</th>
        </tr>
    </ng-template>

    <ng-template #body let-alan>
        <tr>
            <td>{{ alan.ad }}</td>
            <td>{{ getSinifAdi(alan) }}</td>
            <td>{{ alan.ozelAd?.trim()?.length ? alan.ozelAd : '-' }}</td>
            <td>{{ getBinaAdi(alan.binaId) }}</td>
            <td>{{ alan.aktifMi ? 'Aktif' : 'Pasif' }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button label="Goruntule" icon="pi pi-eye" size="small" severity="info" [outlined]="true" (onClick)="openView(alan)" />
                    @if (canManage) {
                        <p-button label="Duzenle" icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(alan)" />
                        <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="deleteAlan(alan)" />
                    }
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<app-isletme-alani-dialog
    [(visible)]="dialogVisible"
    [mode]="dialogMode"
    [model]="selectedAlan"
    [binalar]="binalar"
    [siniflar]="siniflar"
    [saving]="saving"
    [canManage]="canManage"
    (save)="onDialogSave($event)"
    (modeChange)="dialogMode = $event"
/>
