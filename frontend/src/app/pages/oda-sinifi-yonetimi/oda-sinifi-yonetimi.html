<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        @if (canManage) {
            <p-button label="Yeni Oda Sinifi" icon="pi pi-plus" class="mr-2" (onClick)="openNew()" />
        }
        <p-button label="Yenile" icon="pi pi-refresh" severity="secondary" [outlined]="true" (onClick)="refresh()" />
    </ng-template>
</p-toolbar>

<p-table
    [value]="odaSiniflari"
    [loading]="loading"
    dataKey="id"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    sortMode="single"
    [paginator]="true"
    [rows]="pageSize"
    [first]="(pageNumber - 1) * pageSize"
    [rowsPerPageOptions]="[10, 20, 50]"
    [totalRecords]="totalRecords"
    [tableStyle]="{ 'min-width': '60rem' }"
    currentPageReportTemplate="{first} - {last} / {totalRecords}"
    [showCurrentPageReport]="true"
>
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Oda Sinifi Yonetimi</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" [ngModel]="searchQuery" placeholder="Ara..." (input)="onSearchInput($event)" />
            </p-iconfield>
        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th pSortableColumn="kod">Kod <p-sortIcon field="kod" /></th>
            <th pSortableColumn="ad">Ad <p-sortIcon field="ad" /></th>
            <th pSortableColumn="aktifMi">Durum <p-sortIcon field="aktifMi" /></th>
            <th style="width: 18rem">Islem</th>
        </tr>
    </ng-template>

    <ng-template #body let-odaSinifi>
        <tr>
            <td>{{ odaSinifi.kod }}</td>
            <td>{{ odaSinifi.ad }}</td>
            <td>{{ odaSinifi.aktifMi ? 'Aktif' : 'Pasif' }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button label="Goruntule" icon="pi pi-eye" size="small" severity="info" [outlined]="true" (onClick)="openView(odaSinifi)" />
                    @if (canManage) {
                        <p-button label="Duzenle" icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(odaSinifi)" />
                        <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="deleteOdaSinifi(odaSinifi)" />
                    }
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<app-oda-sinifi-dialog
    [(visible)]="dialogVisible"
    [mode]="dialogMode"
    [model]="selectedOdaSinifi"
    [saving]="saving"
    [canManage]="canManage"
    (save)="onDialogSave($event)"
    (modeChange)="dialogMode = $event"
/>
