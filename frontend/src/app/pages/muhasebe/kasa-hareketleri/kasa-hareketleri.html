<p-toast />
<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yeni" icon="pi pi-plus" (onClick)="openCreate()" />
        <p-button label="Yenile" icon="pi pi-refresh" class="ml-2" severity="secondary" [outlined]="true" (onClick)="load()" />
    </ng-template>
</p-toolbar>

<p-table [value]="records" [loading]="loading" dataKey="id" [tableStyle]="{ 'min-width': '64rem' }" [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [paginator]="true" [rows]="pageSize" [first]="(pageNumber - 1) * pageSize" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10,20,50]">
    <ng-template #caption><h5 class="m-0">Kasa Hareketleri</h5></ng-template>
    <ng-template #header><tr><th>Tarih</th><th>Kasa</th><th>Tip</th><th>Tutar</th><th>Cari</th><th>Durum</th><th>Islem</th></tr></ng-template>
    <ng-template #body let-item>
        <tr>
            <td>{{ item.hareketTarihi | date: 'dd.MM.yyyy HH:mm' }}</td><td>{{ item.kasaKodu }}</td><td>{{ item.hareketTipi }}</td>
            <td>{{ item.tutar | number: '1.2-2' }} {{ item.paraBirimi }}</td><td>{{ item.cariKartId || '-' }}</td><td>{{ item.durum }}</td>
            <td><div class="flex gap-2"><p-button icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(item)" /><p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="delete(item)" /></div></td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" header="Kasa Hareket" [style]="{ width: '36rem', 'max-width': '95vw' }">
    <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6"><label class="block mb-2">Kasa</label><input pInputText class="w-full" [(ngModel)]="model.kasaKodu" /></div>
        <div class="col-span-12 md:col-span-6"><label class="block mb-2">Tip</label><p-select class="w-full" [options]="hareketTipleri" optionLabel="label" optionValue="value" [(ngModel)]="model.hareketTipi" appendTo="body" /></div>
        <div class="col-span-12 md:col-span-6"><label class="block mb-2">Tutar</label><p-inputNumber class="w-full" [(ngModel)]="model.tutar" mode="decimal" [minFractionDigits]="2" [maxFractionDigits]="2" /></div>
        <div class="col-span-12 md:col-span-6"><label class="block mb-2">Cari</label><p-select class="w-full" [options]="cariKartlar" optionLabel="label" optionValue="value" [showClear]="true" [(ngModel)]="model.cariKartId" appendTo="body" /></div>
    </div>
    <ng-template #footer>
        <p-button label="Vazgec" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button label="Kaydet" icon="pi pi-check" [loading]="saving" (onClick)="save()" />
    </ng-template>
</p-dialog>
