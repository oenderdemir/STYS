<p-toast />

<div class="grid grid-cols-12 gap-3 mb-4">
  <!-- Tesis -->
  <div class="col-span-12 md:col-span-6 lg:col-span-3">
    <label class="block mb-1 text-sm font-medium">Tesis</label>
    <p-select
      [options]="tesisSecenekleri"
      [(ngModel)]="filter.tesisId"
      placeholder="Tesis seçiniz"
      optionLabel="label"
      optionValue="value"
      [showClear]="true"
      styleClass="w-full" />
  </div>

  <!-- Mali Yıl -->
  <div class="col-span-12 md:col-span-6 lg:col-span-2">
    <label class="block mb-1 text-sm font-medium">Mali Yıl</label>
    <p-select
      [options]="maliYilSecenekleri"
      [(ngModel)]="filter.maliYil"
      placeholder="Mali Yıl"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

  <!-- Dönem -->
  <div class="col-span-12 md:col-span-6 lg:col-span-2">
    <label class="block mb-1 text-sm font-medium">Dönem</label>
    <p-select
      [options]="donemSecenekleri"
      [(ngModel)]="filter.donem"
      placeholder="Dönem"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

  <!-- Başlangıç Tarihi -->
  <div class="col-span-12 md:col-span-6 lg:col-span-2">
    <label class="block mb-1 text-sm font-medium">Başlangıç Tarihi</label>
    <input
      type="date"
      [(ngModel)]="filter.baslangicTarihi"
      class="w-full p-inputtext p-component p-element" />
  </div>

  <!-- Bitiş Tarihi -->
  <div class="col-span-12 md:col-span-6 lg:col-span-2">
    <label class="block mb-1 text-sm font-medium">Bitiş Tarihi</label>
    <input
      type="date"
      [(ngModel)]="filter.bitisTarihi"
      class="w-full p-inputtext p-component p-element" />
  </div>
</div>

<div class="grid grid-cols-12 gap-3 mb-4">
  <!-- Fiş Tipi -->
  <div class="col-span-12 md:col-span-6 lg:col-span-2">
    <label class="block mb-1 text-sm font-medium">Fiş Tipi</label>
    <p-select
      [options]="fisTipiSecenekleri"
      [(ngModel)]="filter.fisTipi"
      placeholder="Tümü"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

  <!-- Durum -->
  <div class="col-span-12 md:col-span-6 lg:col-span-2">
    <label class="block mb-1 text-sm font-medium">Durum</label>
    <p-select
      [options]="durumSecenekleri"
      [(ngModel)]="filter.durum"
      placeholder="Tümü"
      optionLabel="label"
      optionValue="value"
      styleClass="w-full" />
  </div>

  <!-- Fiş No -->
  <div class="col-span-12 md:col-span-6 lg:col-span-3">
    <label class="block mb-1 text-sm font-medium">Fiş No</label>
    <input
      type="text"
      pInputText
      [(ngModel)]="filter.fisNo"
      placeholder="Fiş no ile ara..."
      class="w-full" />
  </div>

  <!-- Açıklama -->
  <div class="col-span-12 md:col-span-6 lg:col-span-3">
    <label class="block mb-1 text-sm font-medium">Açıklama</label>
    <input
      type="text"
      pInputText
      [(ngModel)]="filter.aciklama"
      placeholder="Açıklama ile ara..."
      class="w-full" />
  </div>

  <!-- Butonlar -->
  <div class="col-span-12 md:col-span-6 lg:col-span-3 flex align-items-end gap-2">
    <p-button
      label="Ara"
      icon="pi pi-search"
      (onClick)="ara()"
      [loading]="loading"
      severity="primary" />
    <p-button
      label="Temizle"
      icon="pi pi-times"
      (onClick)="temizle()"
      severity="secondary"
      [outlined]="true" />
    <p-button
      label="Excel'e Aktar"
      icon="pi pi-file-excel"
      severity="success"
      (onClick)="exportExcel()"
      [loading]="exporting" />
  </div>
</div>

<p-table
  [value]="result"
  [loading]="loading"
  [paginator]="false"
  [rows]="filter.pageSize"
  styleClass="p-datatable-sm text-sm"
  dataKey="id"
  responsiveLayout="scroll">
  <ng-template #header>
    <tr>
      <th class="w-3rem">#</th>
      <th>Fiş No</th>
      <th>Tarih</th>
      <th>Tipi</th>
      <th>Durum</th>
      <th class="text-right">Borç</th>
      <th class="text-right">Alacak</th>
      <th>Açıklama</th>
      <th class="w-5rem"></th>
    </tr>
  </ng-template>

  <ng-template #body let-row let-i="rowIndex">
    <tr [ngClass]="{ 'highlight-row': isHighlighted(row) }">
      <td>{{ row.id }}</td>
      <td class="font-semibold">{{ row.fisNo }}</td>
      <td>{{ row.fisTarihi | date:'dd.MM.yyyy' }}</td>
      <td>
        <p-tag
          [value]="getFisTipiLabel(row.fisTipi)"
          [severity]="getFisTipiSeverity(row.fisTipi)"
          styleClass="text-xs" />
      </td>
      <td>
        <p-tag
          [value]="getDurumLabel(row.durum)"
          [severity]="getDurumSeverity(row.durum)"
          styleClass="text-xs" />
      </td>
      <td class="text-right">{{ row.toplamBorc | number:'1.2-2' }}</td>
      <td class="text-right">{{ row.toplamAlacak | number:'1.2-2' }}</td>
      <td class="text-xs text-color-secondary">{{ row.aciklama }}</td>
      <td>
        <p-button
          icon="pi pi-search"
          severity="secondary"
          [text]="true"
          size="small"
          [rounded]="true"
          (onClick)="goToFis(row)" />
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="9" class="text-center text-color-secondary p-4">
        Gösterilecek fiş bulunamadı.
      </td>
    </tr>
  </ng-template>
</p-table>

<div class="flex justify-content-between align-items-center mt-3">
  <p-button
    label="Önceki"
    icon="pi pi-chevron-left"
    (onClick)="oncekiSayfa()"
    [disabled]="filter.page <= 1"
    severity="secondary"
    [outlined]="true"
    size="small" />

  <div class="flex align-items-center gap-2">
    <span class="text-sm text-color-secondary">{{ getSayfaDurumu() }}</span>
    <p-select
      [options]="pageSizeSecenekleri"
      [(ngModel)]="filter.pageSize"
      (ngModelChange)="onPageSizeChange()"
      optionLabel="label"
      optionValue="value"
      styleClass="w-6rem"
      class="w-6rem" />
  </div>

  <p-button
    label="Sonraki"
    icon="pi pi-chevron-right"
    iconPos="right"
    (onClick)="sonrakiSayfa()"
    [disabled]="filter.page * filter.pageSize >= totalCount"
    severity="secondary"
    [outlined]="true"
    size="small" />
</div>
