<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        @if (canManage) {
            <p-button label="Yeni Bina" icon="pi pi-plus" class="mr-2" (onClick)="openNew()" />
        }
        <p-button label="Yenile" icon="pi pi-refresh" severity="secondary" [outlined]="true" (onClick)="refresh()" />
    </ng-template>
</p-toolbar>

<p-table
    #dt
    [value]="binalar"
    [loading]="loading"
    dataKey="id"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 20, 50]"
    [tableStyle]="{ 'min-width': '65rem' }"
    [globalFilterFields]="['ad']"
    currentPageReportTemplate="{first} - {last} / {totalRecords}"
    [showCurrentPageReport]="true"
>
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Bina Yonetimi</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" placeholder="Ara..." (input)="onGlobalFilter(dt, $event)" />
            </p-iconfield>
        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th>Bina Adi</th>
            <th>Tesis</th>
            <th>Kat Sayisi</th>
            <th>Durum</th>
            <th style="width: 12rem">Islem</th>
        </tr>
    </ng-template>

    <ng-template #body let-bina>
        <tr>
            <td>{{ bina.ad }}</td>
            <td>{{ getTesisAdi(bina.tesisId) }}</td>
            <td>{{ bina.katSayisi }}</td>
            <td>{{ bina.aktifMi ? 'Aktif' : 'Pasif' }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button [label]="canManage ? 'Duzenle' : 'Detay'" icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(bina)" />
                    @if (canManage) {
                        <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="deleteBina(bina)" />
                    }
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog
    [header]="isEditMode ? 'Bina Duzenle' : 'Yeni Bina'"
    [(visible)]="dialogVisible"
    [modal]="true"
    [style]="{ width: '35rem', 'max-width': '95vw' }"
    [breakpoints]="{ '960px': '95vw' }"
>
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-12 md:col-span-6">
            <label for="ad" class="block font-medium mb-2">Bina Adi</label>
            <input id="ad" pInputText [(ngModel)]="selectedBina.ad" class="w-full" [disabled]="!canManage || saving" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label for="tesisId" class="block font-medium mb-2">Tesis</label>
            <p-select
                inputId="tesisId"
                [options]="tesisler"
                optionLabel="ad"
                optionValue="id"
                [(ngModel)]="selectedBina.tesisId"
                [showClear]="true"
                [filter]="true"
                appendTo="body"
                class="w-full"
                [disabled]="!canManage || saving"
            />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label for="katSayisi" class="block font-medium mb-2">Kat Sayisi</label>
            <p-inputnumber inputId="katSayisi" [(ngModel)]="selectedBina.katSayisi" [min]="1" [useGrouping]="false" styleClass="w-full" [disabled]="!canManage || saving" />
        </div>
        <div class="col-span-12 md:col-span-6 flex items-center gap-3 mt-7">
            <p-toggleswitch inputId="aktifMi" [(ngModel)]="selectedBina.aktifMi" [disabled]="!canManage || saving" />
            <label for="aktifMi">Aktif</label>
        </div>
    </div>

    <ng-template #footer>
        <p-button label="Kapat" icon="pi pi-times" severity="secondary" text [disabled]="saving" (onClick)="dialogVisible = false" />
        @if (canManage) {
            <p-button [label]="saving ? 'Kaydediliyor...' : 'Kaydet'" icon="pi pi-check" [disabled]="saving" (onClick)="saveBina()" />
        }
    </ng-template>
</p-dialog>
