services:
  loki:
    image: grafana/loki:3.4.3
    container_name: stys-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - stys-observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: stys-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${STYS_GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${STYS_GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - stys-observability
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: stys-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    volumes:
      - ${STYS_BACKEND_LOG_HOST_PATH:-./Logs}:${STYS_ALLOY_LOG_CONTAINER_PATH:-/var/log/stys/backend}:ro
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - stys-observability
    restart: unless-stopped

networks:
  stys-observability:
    name: stys-observability

volumes:
  loki_data:
    name: stys_loki_data
  grafana_data:
    name: stys_grafana_data
