<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yeni" icon="pi pi-plus" (onClick)="openCreate()" />
        <p-button label="Yenile" icon="pi pi-refresh" class="ml-2" severity="secondary" [outlined]="true" (onClick)="load()" />
        <p-button label="Ornek Import" icon="pi pi-upload" class="ml-2" severity="contrast" [outlined]="true" (onClick)="importOrnekVeri()" />
    </ng-template>
</p-toolbar>

<p-table [value]="records" [loading]="loading" dataKey="id" [tableStyle]="{ 'min-width': '72rem' }" [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [paginator]="true" [rows]="pageSize" [first]="(pageNumber - 1) * pageSize" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10,20,50]">
    <ng-template #caption><h5 class="m-0">Tasinir Kodlari</h5></ng-template>
    <ng-template #header>
        <tr>
            <th>Tam Kod</th>
            <th>Ad</th>
            <th>Duzey</th>
            <th>Durum</th>
            <th style="width: 10rem">Islem</th>
        </tr>
    </ng-template>
    <ng-template #body let-item>
        <tr>
            <td>{{ item.tamKod }}</td>
            <td>{{ item.ad }}</td>
            <td>{{ item.duzeyNo }}</td>
            <td><p-tag [value]="item.aktifMi ? 'Aktif' : 'Pasif'" [severity]="item.aktifMi ? 'success' : 'secondary'" [rounded]="true" /></td>
            <td>
                <div class="flex gap-2">
                    <p-button icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(item)" />
                    <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="delete(item)" />
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" [header]="dialogMode === 'edit' ? 'Tasinir Kod Duzenle' : 'Yeni Tasinir Kod'" [style]="{ width: '42rem', 'max-width': '95vw' }">
    <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6">
            <label class="block font-medium mb-2">Tam Kod</label>
            <input pInputText class="w-full" [(ngModel)]="model.tamKod" maxlength="64" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label class="block font-medium mb-2">Duzey No</label>
            <p-inputnumber [(ngModel)]="model.duzeyNo" [useGrouping]="false" [min]="1" class="w-full" inputStyleClass="w-full" />
        </div>
        <div class="col-span-12">
            <label class="block font-medium mb-2">Ad</label>
            <input pInputText class="w-full" [(ngModel)]="model.ad" maxlength="256" />
        </div>
        <div class="col-span-12 md:col-span-4">
            <label class="block font-medium mb-2">Duzey 1</label>
            <input pInputText class="w-full" [(ngModel)]="model.duzey1Kod" maxlength="16" />
        </div>
        <div class="col-span-12 md:col-span-4">
            <label class="block font-medium mb-2">Duzey 2</label>
            <input pInputText class="w-full" [(ngModel)]="model.duzey2Kod" maxlength="16" />
        </div>
        <div class="col-span-12 md:col-span-4">
            <label class="block font-medium mb-2">Duzey 3</label>
            <input pInputText class="w-full" [(ngModel)]="model.duzey3Kod" maxlength="16" />
        </div>
        <div class="col-span-12 flex align-items-center gap-2"><input id="aktifKod" type="checkbox" [(ngModel)]="model.aktifMi" /><label for="aktifKod">Aktif</label></div>
    </div>

    <ng-template #footer>
        <p-button label="Vazgec" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button label="Kaydet" icon="pi pi-check" [loading]="saving" (onClick)="save()" />
    </ng-template>
</p-dialog>
