<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yeni" icon="pi pi-plus" (onClick)="openCreate()" />
        <p-button label="Yenile" icon="pi pi-refresh" class="ml-2" severity="secondary" [outlined]="true" (onClick)="load()" />
    </ng-template>
    <ng-template #end>
        <div class="w-18rem">
            <p-select
                [options]="tesisSecenekleri"
                optionLabel="label"
                optionValue="value"
                [(ngModel)]="selectedTesisId"
                placeholder="Tesis seciniz"
                appendTo="body"
                class="w-full"
                (ngModelChange)="onTesisFilterChange()" />
        </div>
    </ng-template>
</p-toolbar>

<p-table [value]="filteredRecords" [loading]="loading" dataKey="id" [tableStyle]="{ 'min-width': '72rem' }" [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [paginator]="true" [rows]="pageSize" [first]="(pageNumber - 1) * pageSize" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10,20,50]">
    <ng-template #caption><h5 class="m-0">Tasinir Kartlari</h5></ng-template>
    <ng-template #header>
        <tr>
            <th>Stok Kodu</th>
            <th>Ad</th>
            <th>Tesis</th>
            <th>Malzeme Tipi</th>
            <th>Birim</th>
            <th>KDV</th>
            <th>Durum</th>
            <th style="width: 10rem">Islem</th>
        </tr>
    </ng-template>
    <ng-template #body let-item>
        <tr>
            <td>{{ item.stokKodu }}</td>
            <td>{{ item.ad }}</td>
            <td>{{ getTesisAdi(item.tesisId) }}</td>
            <td>{{ item.malzemeTipi }}</td>
            <td>{{ item.birim }}</td>
            <td>{{ item.kdvOrani }}%</td>
            <td><p-tag [value]="item.aktifMi ? 'Aktif' : 'Pasif'" [severity]="item.aktifMi ? 'success' : 'secondary'" [rounded]="true" /></td>
            <td>
                <div class="flex gap-2">
                    <p-button icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(item)" />
                    <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="delete(item)" />
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" [header]="dialogMode === 'edit' ? 'Tasinir Kart Duzenle' : 'Yeni Tasinir Kart'" [style]="{ width: '52rem', 'max-width': '96vw' }">
    <div class="grid grid-cols-12 gap-3 mt-1">
        <div class="col-span-12 md:col-span-5">
            <label class="block font-medium mb-2">Tesis</label>
            <p-select class="w-full" [options]="tesisSecenekleri" optionLabel="label" optionValue="value" appendTo="body" [(ngModel)]="model.tesisId" />
        </div>
        <div class="col-span-12 md:col-span-7">
            <label class="block font-medium mb-2">Tasinir Kodu</label>
            <p-autocomplete
                styleClass="w-full"
                inputStyleClass="w-full"
                panelStyleClass="min-w-full"
                [(ngModel)]="selectedTasinirKodOption"
                (ngModelChange)="onTasinirKodModelChange($event)"
                [suggestions]="tasinirKodSearchResults"
                (completeMethod)="searchTasinirKod($event)"
                (onSelect)="onTasinirKodSelect()"
                [dropdown]="true"
                [delay]="0"
                [minLength]="2"
                [forceSelection]="false"
                optionLabel="label"
                placeholder="Orn. 150.01.01.08.0* veya ad ile ara"
                appendTo="body" />
            <small class="text-color-secondary">Kod veya ad yazarak secim yapin.</small>
        </div>
        <div class="col-span-12 md:col-span-5">
            <label class="block font-medium mb-2">Stok Kodu</label>
            <input pInputText class="w-full" [(ngModel)]="model.stokKodu" maxlength="64" />
        </div>
        <div class="col-span-12">
            <label class="block font-medium mb-2">Ad</label>
            <input pInputText class="w-full" [(ngModel)]="model.ad" maxlength="256" />
        </div>
        <div class="col-span-12 md:col-span-3">
            <label class="block font-medium mb-2">Birim</label>
            <p-select class="w-full" [options]="paketTuruSecenekleri" optionLabel="label" optionValue="value" [(ngModel)]="model.birim" appendTo="body" [filter]="true" filterBy="label" />
        </div>
        <div class="col-span-12 md:col-span-4">
            <label class="block font-medium mb-2">Malzeme Tipi</label>
            <p-select class="w-full" [options]="malzemeTipleri" optionLabel="label" optionValue="value" [(ngModel)]="model.malzemeTipi" appendTo="body" />
        </div>
        <div class="col-span-12 md:col-span-3">
            <label class="block font-medium mb-2">KDV Orani</label>
            <p-inputnumber [(ngModel)]="model.kdvOrani" [min]="0" [max]="100" [minFractionDigits]="0" [maxFractionDigits]="2" class="w-full" inputStyleClass="w-full" />
        </div>
        <div class="col-span-12 md:col-span-2 flex align-items-end">
            <div class="flex align-items-center gap-2">
                <p-checkbox inputId="aktifMi" [(ngModel)]="model.aktifMi" [binary]="true" />
                <label for="aktifMi">Aktif</label>
            </div>
        </div>
        <div class="col-span-12 border-1 surface-border border-round p-3">
            <div class="text-sm font-semibold mb-3">Ozellikler</div>
            <div class="flex flex-wrap gap-4">
                <div class="flex align-items-center gap-2">
                    <p-checkbox inputId="sarfMi" [(ngModel)]="model.sarfMi" [binary]="true" />
                    <label for="sarfMi">Sarf</label>
                </div>
                <div class="flex align-items-center gap-2">
                    <p-checkbox inputId="demirbasMi" [(ngModel)]="model.demirbasMi" [binary]="true" />
                    <label for="demirbasMi">Demirbas</label>
                </div>
                <div class="flex align-items-center gap-2">
                    <p-checkbox inputId="takipliMi" [(ngModel)]="model.takipliMi" [binary]="true" />
                    <label for="takipliMi">Takipli</label>
                </div>
            </div>
        </div>
    </div>

    <ng-template #footer>
        <p-button label="Vazgec" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button label="Kaydet" icon="pi pi-check" [loading]="saving" (onClick)="save()" />
    </ng-template>
</p-dialog>
