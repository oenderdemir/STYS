<p-toast />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yenile" icon="pi pi-refresh" severity="secondary" [outlined]="true" [disabled]="loadingReferences || loadingTarifeler" (onClick)="refresh()" />
    </ng-template>
    <ng-template #end>
        <p-button label="Yeni Satir" icon="pi pi-plus" class="mr-2" [disabled]="!canManage || !selectedTesisId" (onClick)="addRow()" />
        <p-button label="Kaydet" icon="pi pi-check" [loading]="saving" [disabled]="!canManage || !selectedTesisId || loadingReferences || loadingTarifeler" (onClick)="save()" />
    </ng-template>
</p-toolbar>

<div class="card">
    <h5 class="m-0 mb-3">Ek Hizmet Yonetimi</h5>

    <div class="grid grid-cols-12 gap-4 mb-4">
        <div class="col-span-12 md:col-span-6 lg:col-span-4">
            <label for="ekHizmetTesis" class="block font-medium mb-2">Tesis</label>
            <p-select
                inputId="ekHizmetTesis"
                class="w-full"
                [options]="tesisler"
                optionLabel="ad"
                optionValue="id"
                [(ngModel)]="selectedTesisId"
                [appendTo]="'body'"
                [filter]="true"
                [showClear]="false"
                [disabled]="loadingReferences || loadingTarifeler"
                (onChange)="onTesisChange()"
            />
        </div>
    </div>

    <p-table [value]="tarifeler" [loading]="loadingTarifeler" [tableStyle]="{ 'min-width': '72rem' }">
        <ng-template #header>
            <tr>
                <th>Hizmet Adi</th>
                <th>Aciklama</th>
                <th>Birim</th>
                <th>Fiyat</th>
                <th>PB</th>
                <th>Baslangic</th>
                <th>Bitis</th>
                <th>Aktif</th>
                <th style="width: 5rem">Sil</th>
            </tr>
        </ng-template>
        <ng-template #body let-row let-rowIndex="rowIndex">
            <tr>
                <td><input pInputText class="w-full" [(ngModel)]="row.ad" [disabled]="!canManage || saving" /></td>
                <td><input pInputText class="w-full" [(ngModel)]="row.aciklama" [disabled]="!canManage || saving" /></td>
                <td><input pInputText class="w-full" [(ngModel)]="row.birimAdi" [disabled]="!canManage || saving" /></td>
                <td><input pInputText class="w-full" type="number" min="0" step="0.01" [(ngModel)]="row.birimFiyat" [disabled]="!canManage || saving" /></td>
                <td><input pInputText class="w-full" maxlength="3" [(ngModel)]="row.paraBirimi" [disabled]="!canManage || saving" /></td>
                <td><input pInputText class="w-full" type="date" [(ngModel)]="row.baslangicTarihi" [disabled]="!canManage || saving" /></td>
                <td><input pInputText class="w-full" type="date" [(ngModel)]="row.bitisTarihi" [disabled]="!canManage || saving" /></td>
                <td class="text-center">
                    <p-checkbox [binary]="true" [(ngModel)]="row.aktifMi" [disabled]="!canManage || saving" />
                </td>
                <td class="text-center">
                    <p-button icon="pi pi-trash" severity="danger" [text]="true" [disabled]="!canManage || saving" (onClick)="removeRow(rowIndex)" />
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="9" class="text-center text-color-secondary">Bu tesis icin tanimli ek hizmet tarife kaydi bulunmuyor.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
