<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        @if (canManage) {
            <p-button label="Yeni Isletme Alani" icon="pi pi-plus" class="mr-2" (onClick)="openNew()" />
        }
        <p-button label="Yenile" icon="pi pi-refresh" severity="secondary" [outlined]="true" (onClick)="refresh()" />
    </ng-template>
</p-toolbar>

<p-table
    [value]="alanlar"
    [loading]="loading"
    dataKey="id"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [paginator]="true"
    [rows]="pageSize"
    [first]="(pageNumber - 1) * pageSize"
    [rowsPerPageOptions]="[10, 20, 50]"
    [totalRecords]="totalRecords"
    [tableStyle]="{ 'min-width': '60rem' }"
    currentPageReportTemplate="{first} - {last} / {totalRecords}"
    [showCurrentPageReport]="true"
>
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Isletme Alani Yonetimi</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" [ngModel]="searchQuery" placeholder="Ara..." (input)="onSearchInput($event)" />
            </p-iconfield>
        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th>Alan Adi</th>
            <th>Bina</th>
            <th>Durum</th>
            <th style="width: 12rem">Islem</th>
        </tr>
    </ng-template>

    <ng-template #body let-alan>
        <tr>
            <td>{{ alan.ad }}</td>
            <td>{{ getBinaAdi(alan.binaId) }}</td>
            <td>{{ alan.aktifMi ? 'Aktif' : 'Pasif' }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button [label]="canManage ? 'Duzenle' : 'Detay'" icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(alan)" />
                    @if (canManage) {
                        <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="deleteAlan(alan)" />
                    }
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog
    [header]="isEditMode ? 'Isletme Alani Duzenle' : 'Yeni Isletme Alani'"
    [(visible)]="dialogVisible"
    [modal]="true"
    [style]="{ width: '35rem', 'max-width': '95vw' }"
    [breakpoints]="{ '960px': '95vw' }"
>
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-12 md:col-span-6">
            <label for="ad" class="block font-medium mb-2">Alan Adi</label>
            <input id="ad" pInputText [(ngModel)]="selectedAlan.ad" class="w-full" [disabled]="!canManage || saving" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label for="binaId" class="block font-medium mb-2">Bina</label>
            <p-select
                inputId="binaId"
                [options]="binalar"
                optionLabel="ad"
                optionValue="id"
                [(ngModel)]="selectedAlan.binaId"
                [showClear]="true"
                [filter]="true"
                appendTo="body"
                class="w-full"
                [disabled]="!canManage || saving"
            />
        </div>
        <div class="col-span-12 flex items-center gap-3">
            <p-toggleswitch inputId="aktifMi" [(ngModel)]="selectedAlan.aktifMi" [disabled]="!canManage || saving" />
            <label for="aktifMi">Aktif</label>
        </div>
    </div>

    <ng-template #footer>
        <p-button label="Kapat" icon="pi pi-times" severity="secondary" text [disabled]="saving" (onClick)="dialogVisible = false" />
        @if (canManage) {
            <p-button [label]="saving ? 'Kaydediliyor...' : 'Kaydet'" icon="pi pi-check" [disabled]="saving" (onClick)="saveAlan()" />
        }
    </ng-template>
</p-dialog>
