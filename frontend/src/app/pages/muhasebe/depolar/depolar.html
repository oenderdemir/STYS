<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yeni" icon="pi pi-plus" (onClick)="openCreate()" />
        <p-button label="Yenile" icon="pi pi-refresh" class="ml-2" severity="secondary" [outlined]="true" (onClick)="load()" />
    </ng-template>
    <ng-template #end>
        <div class="w-18rem">
            <p-select
                [options]="tesisSecenekleri"
                optionLabel="label"
                optionValue="value"
                [(ngModel)]="selectedTesisId"
                placeholder="Tesis seciniz"
                appendTo="body"
                class="w-full"
                (ngModelChange)="onTesisFilterChange()" />
        </div>
    </ng-template>
</p-toolbar>

<p-table [value]="filteredRecords" [loading]="loading" dataKey="id" [tableStyle]="{ 'min-width': '64rem' }" [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [paginator]="true" [rows]="pageSize" [first]="(pageNumber - 1) * pageSize" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10,20,50]">
    <ng-template #caption><h5 class="m-0">Depolar</h5></ng-template>
    <ng-template #header>
        <tr>
            <th>Kod</th>
            <th>Ad</th>
            <th>Tesis</th>
            <th>Durum</th>
            <th style="width: 10rem">Islem</th>
        </tr>
    </ng-template>
    <ng-template #body let-item>
        <tr>
            <td>{{ item.kod }}</td>
            <td>{{ item.ad }}</td>
            <td>{{ getTesisAdi(item.tesisId) }}</td>
            <td><p-tag [value]="item.aktifMi ? 'Aktif' : 'Pasif'" [severity]="item.aktifMi ? 'success' : 'secondary'" [rounded]="true" /></td>
            <td>
                <div class="flex gap-2">
                    <p-button icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(item)" />
                    <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="delete(item)" />
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" [header]="dialogMode === 'edit' ? 'Depo Duzenle' : 'Yeni Depo'" [style]="{ width: '42rem', 'max-width': '95vw' }">
    <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6">
            <label class="block font-medium mb-2">Kod</label>
            <input pInputText class="w-full" [(ngModel)]="model.kod" maxlength="64" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label class="block font-medium mb-2">Tesis</label>
            <p-select class="w-full" [options]="tesisSecenekleri" optionLabel="label" optionValue="value" [(ngModel)]="model.tesisId" appendTo="body" />
        </div>
        <div class="col-span-12">
            <label class="block font-medium mb-2">Ad</label>
            <input pInputText class="w-full" [(ngModel)]="model.ad" maxlength="200" />
        </div>
        <div class="col-span-12 flex align-items-center gap-2"><input id="depoAktif" type="checkbox" [(ngModel)]="model.aktifMi" /><label for="depoAktif">Aktif</label></div>
    </div>

    <ng-template #footer>
        <p-button label="Vazgec" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button label="Kaydet" icon="pi pi-check" [loading]="saving" (onClick)="save()" />
    </ng-template>
</p-dialog>
