<p-toast />
<p-confirmdialog />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yeni" icon="pi pi-plus" (onClick)="openCreate()" />
        <p-button label="Yenile" icon="pi pi-refresh" class="ml-2" severity="secondary" [outlined]="true" (onClick)="load()" />
    </ng-template>
</p-toolbar>

<p-table [value]="records" [loading]="loading" dataKey="id" [tableStyle]="{ 'min-width': '48rem' }" [lazy]="true" (onLazyLoad)="onLazyLoad($event)" [paginator]="true" [rows]="pageSize" [first]="(pageNumber - 1) * pageSize" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10,20,50]">
    <ng-template #caption><h5 class="m-0">Paket Turleri</h5></ng-template>
    <ng-template #header>
        <tr>
            <th>Paket Turu</th>
            <th>Kisa Ad</th>
            <th>Durum</th>
            <th style="width: 10rem">Islem</th>
        </tr>
    </ng-template>
    <ng-template #body let-item>
        <tr>
            <td>{{ item.ad }}</td>
            <td>{{ item.kisaAd }}</td>
            <td>{{ item.aktifMi ? 'Aktif' : 'Pasif' }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(item)" />
                    <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="delete(item)" />
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" [header]="dialogMode === 'edit' ? 'Paket Turu Duzenle' : 'Yeni Paket Turu'" [style]="{ width: '32rem', 'max-width': '96vw' }">
    <div class="grid grid-cols-12 gap-3 mt-1">
        <div class="col-span-12">
            <label class="block font-medium mb-2">Paket Turu</label>
            <input pInputText class="w-full" [(ngModel)]="model.ad" maxlength="128" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label class="block font-medium mb-2">Kisa Ad</label>
            <input pInputText class="w-full" [(ngModel)]="model.kisaAd" maxlength="16" />
        </div>
        <div class="col-span-12 md:col-span-6 flex align-items-end">
            <div class="flex align-items-center gap-2">
                <p-checkbox inputId="paketTuruAktif" [(ngModel)]="model.aktifMi" [binary]="true" />
                <label for="paketTuruAktif">Aktif</label>
            </div>
        </div>
    </div>

    <ng-template #footer>
        <p-button label="Vazgec" icon="pi pi-times" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button label="Kaydet" icon="pi pi-check" [loading]="saving" (onClick)="save()" />
    </ng-template>
</p-dialog>
