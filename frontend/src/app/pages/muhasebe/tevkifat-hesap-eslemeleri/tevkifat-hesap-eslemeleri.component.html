<app-muhasebe-tesis-context-bar />

<p-toast />

<p-toolbar styleClass="mb-4">
    <ng-template #start>
        <p-button label="Yeni" icon="pi pi-plus" (onClick)="openCreate()" />
        <p-button label="Yenile" icon="pi pi-refresh" class="ml-2" severity="secondary" [outlined]="true" (onClick)="load()" />
    </ng-template>
</p-toolbar>

<div class="grid grid-cols-12 gap-3 mb-3">
    <div class="col-span-12 md:col-span-4">
        <label class="block mb-2">Tesis</label>
        <p-select
            [options]="tesisSecenekleriForSelect"
            optionLabel="label"
            optionValue="value"
            [(ngModel)]="filter.tesisId"
            [filter]="true"
            filterBy="label"
            appendTo="body"
            styleClass="w-full" />
    </div>
    <div class="col-span-12 md:col-span-4">
        <label class="block mb-2">İşlem Yönü</label>
        <p-select
            [options]="islemYonuFiltreSecenekleri"
            optionLabel="label"
            optionValue="value"
            [(ngModel)]="filter.islemYonu"
            appendTo="body"
            styleClass="w-full" />
    </div>
    <div class="col-span-12 md:col-span-4">
        <label class="block mb-2">Aktiflik</label>
        <p-select
            [options]="aktifSecenekleri"
            optionLabel="label"
            optionValue="value"
            [(ngModel)]="filter.aktifMi"
            appendTo="body"
            styleClass="w-full" />
    </div>
    <div class="col-span-12 flex gap-2">
        <p-button label="Ara" icon="pi pi-search" (onClick)="applyFilter()" />
        <p-button label="Temizle" icon="pi pi-filter-slash" severity="secondary" [outlined]="true" (onClick)="clearFilter()" />
    </div>
</div>

<p-table
    [value]="records"
    [loading]="loading"
    [lazy]="true"
    [paginator]="true"
    [rows]="pageSize"
    [first]="(pageNumber - 1) * pageSize"
    [totalRecords]="totalRecords"
    [rowsPerPageOptions]="[10, 25, 50]"
    (onLazyLoad)="onLazyLoad($event)"
    responsiveLayout="scroll"
    styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
        <tr>
            <th>Tesis</th>
            <th>Yön</th>
            <th>Oran</th>
            <th>Hesap</th>
            <th>Aktif</th>
            <th>Açıklama</th>
            <th>İşlem</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
        <tr>
            <td>{{ getTesisAdi(item.tesisId) }}</td>
            <td>{{ item.islemYonu }}</td>
            <td>{{ item.tevkifatPay }}/{{ item.tevkifatPayda }}</td>
            <td>{{ item.muhasebeHesapKodu || getHesapLabel(item.muhasebeHesapPlaniId) }}</td>
            <td>{{ item.aktifMi ? 'Aktif' : 'Pasif' }}</td>
            <td>{{ item.aciklama || '-' }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button icon="pi pi-pencil" size="small" severity="secondary" [outlined]="true" (onClick)="openEdit(item)" />
                    <p-button icon="pi pi-trash" size="small" severity="danger" [outlined]="true" (onClick)="delete(item)" />
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" [draggable]="false" [resizable]="false" [style]="{ width: '56rem', 'max-width': '96vw' }" [header]="dialogMode === 'edit' ? 'Tevkifat Hesap Eşleme Düzenle' : 'Yeni Tevkifat Hesap Eşleme'">
    <div class="grid grid-cols-12 gap-3">
        <div class="col-span-12 md:col-span-6">
            <label class="block mb-2">Tesis</label>
            <p-select
                [options]="tesisSecenekleriForSelect"
                optionLabel="label"
                optionValue="value"
                [(ngModel)]="model.tesisId"
                [filter]="true"
                filterBy="label"
                appendTo="body"
                styleClass="w-full" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label class="block mb-2">İşlem Yönü</label>
            <p-select
                [options]="islemYonuSecenekleri"
                optionLabel="label"
                optionValue="value"
                [(ngModel)]="model.islemYonu"
                appendTo="body"
                styleClass="w-full" />
        </div>
        <div class="col-span-12 md:col-span-3">
            <label class="block mb-2">Tevkifat Pay</label>
            <input pInputText type="number" class="w-full" [(ngModel)]="model.tevkifatPay" min="1" />
        </div>
        <div class="col-span-12 md:col-span-3">
            <label class="block mb-2">Tevkifat Payda</label>
            <input pInputText type="number" class="w-full" [(ngModel)]="model.tevkifatPayda" min="1" />
        </div>
        <div class="col-span-12 md:col-span-6">
            <label class="block mb-2">Muhasebe Hesabı</label>
            <p-select
                [options]="hesapSecenekleri"
                optionLabel="label"
                optionValue="value"
                [(ngModel)]="model.muhasebeHesapPlaniId"
                [filter]="true"
                filterBy="label"
                appendTo="body"
                styleClass="w-full" />
        </div>
        <div class="col-span-12 flex items-center gap-2">
            <p-checkbox [(ngModel)]="model.aktifMi" [binary]="true" inputId="aktifMi" />
            <label for="aktifMi">Aktif</label>
        </div>
        <div class="col-span-12">
            <label class="block mb-2">Açıklama</label>
            <textarea pInputTextarea class="w-full" rows="3" [(ngModel)]="model.aciklama"></textarea>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <p-button label="İptal" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button label="Kaydet" [loading]="saving" (onClick)="save()" />
    </ng-template>
</p-dialog>

<p-confirm-dialog />
